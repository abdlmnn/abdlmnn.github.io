  <link rel="preload" as="image" href="../../my-images/me_side.jpg" fetchpriority="high">
  <link rel="stylesheet" href="../index/index.css">

</head>

<body data-page="contact">
  <div id="siteNavMount"></div>
  <div id="mobileNavMount"></div>
  <div id="contactFabMount"></div>

  <main class="contact-page">
    <section class="contact-hero">
      <div class="contact-shell">
        <div class="contact-header">
          <p id="contactEyebrow" class="contact-eyebrow"></p>
          <h1 id="contactTitle" class="contact-title"></h1>
          <p id="contactLead" class="contact-lead"></p>
        </div>

        <div class="contact-stage">
          <figure class="contact-portrait-wrap">
            <div class="contact-portrait-frame">
              <img
                id="contactPortrait"
                class="contact-portrait"
                src="../../my-images/me_side.jpg"
                alt="Portrait of Mohammad Abdulmanan"
                width="1920"
                height="2560"
                loading="eager"
                fetchpriority="high"
                decoding="async">
            </div>
            <figcaption id="contactImageNote" class="contact-image-note"></figcaption>
          </figure>

          <section class="contact-panel" aria-labelledby="contactPanelTitle">
            <p id="contactPanelKicker" class="contact-panel-kicker"></p>
            <h2 id="contactPanelTitle" class="contact-panel-title"></h2>
            <p id="contactPanelIntro" class="contact-panel-intro"></p>
            <div id="contactChannels" class="contact-channels"></div>
          </section>
        </div>
      </div>
    </section>

    <section class="contact-form-section" aria-labelledby="contactFormTitle">
      <div class="contact-shell">
        <div class="contact-form-stage">
          <div class="contact-form-copy">
            <p id="contactFormKicker" class="contact-form-kicker"></p>
            <h2 id="contactFormTitle" class="contact-form-title"></h2>
            <p id="contactFormLead" class="contact-form-lead"></p>
          </div>

          <form
            class="contact-form"
            action="https://formspree.io/f/xpqeddew"
            data-feedback-endpoint="https://abdlmnn-feedback.abdlmnn.workers.dev/feedback-submission"
            method="POST">
            <input type="hidden" name="_subject" value="New contact inquiry from abdlmnn.github.io">

            <div class="contact-form-grid">
              <div class="contact-field">
                <label class="contact-label" for="contactName">Your Name</label>
                <input id="contactName" name="name" type="text" placeholder="What should I call you?" required>
              </div>

              <div class="contact-field">
                <label class="contact-label" for="contactEmail">Your Email</label>
                <input id="contactEmail" name="email" type="email" placeholder="Where can I reply to you?" required>
              </div>

              <div class="contact-field contact-field-full">
                <label class="contact-label" for="contactMessage">Your Message</label>
                <textarea
                  id="contactMessage"
                  name="message"
                  rows="6"
                  placeholder="Share your question, idea, or what you need help with."
                  required></textarea>
              </div>

              <label class="contact-feedback-consent contact-field-full">
                <input id="contactAllowPublic" name="allow_public" type="checkbox" value="yes">
                <span>You may show this message on the website.</span>
              </label>
            </div>

            <input type="text" name="_gotcha" class="contact-form-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">
            <p id="contactFormNotice" class="contact-form-notice" role="status" aria-live="polite">
              Messages will be sent through the form.
            </p>
            <button class="contact-submit" type="submit">Submit Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <p class="footer-text">&copy; 2026 Mohammad Abdulmanan. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../js/shared/site.js"></script>
  <script src="./contact.page.js"></script>
</body>

</html>
