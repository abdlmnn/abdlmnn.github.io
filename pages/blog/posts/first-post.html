<body data-page="post">
  <div id="siteNavMount"></div>
  <div id="mobileNavMount"></div>
  <div id="contactFabMount"></div>

  <article class="post-container">
    <header class="post-header">
      <nav class="post-breadcrumb" aria-label="Breadcrumb">
        <a href="../blog.html" class="breadcrumb-link">
          <span class="breadcrumb-icon" aria-hidden="true">&larr;</span>
          <span class="breadcrumb-text">Back to Blog</span>
        </a>
      </nav>
      <div class="post-title-block">
        <p id="postKicker" class="post-kicker"></p>
        <h1 id="postTitleDisplay" class="post-title">
          <span id="postTitleLine" class="post-title-line"></span>
          <span id="postTitleSubline" class="post-title-line post-title-subline"></span>
        </h1>
      </div>
      <div class="post-header-details">
        <p class="post-signature">
          <span class="post-signature-line"></span>
          <span id="postAuthor" class="post-signature-name"></span>
        </p>
        <div class="post-meta">
          <div class="post-meta-item">
            <p class="post-date-signature">
              <time id="postDate" class="post-date" datetime=""></time>
              <span class="post-date-line"></span>
            </p>
          </div>
        </div>
      </div>
    </header>

    <section class="post-intro-panel" aria-label="Post introduction">
      <div class="post-intro-image-wrap">
        <img id="postIntroImage" src="" alt=""
          class="post-intro-image">
      </div>
      <div class="post-intro-copy">
        <p id="postIntroKicker" class="post-intro-kicker"></p>
        <h2 id="postIntroTitle" class="post-intro-title"></h2>
        <p id="postIntroText" class="post-intro-text"></p>
      </div>
    </section>

    <div class="post-content" id="postContent">
      <section class="post-opening-note" aria-label="Opening note">
        <p id="postOpeningLabel" class="post-opening-label"></p>
        <p id="postLead" class="post-lead"></p>

        <p id="postBodyIntro" class="post-body-intro"></p>
      </section>

      <h2 id="whoIAmHeading"></h2>
      <p id="whoIAmText"></p>
      <p id="developerText"></p>

      <blockquote class="post-quote">
        <p id="postQuote"></p>
      </blockquote>

      <h2 id="whyStartedHeading"></h2>
      <p id="whyStartedText"></p>

      <h2 id="whatYoullFindHeading"></h2>
      <p id="whatYoullFindText"></p>

      <section class="post-notes" aria-label="Post notes">
        <article class="post-note-card">
          <span id="postNoteLabel1" class="post-note-label"></span>
          <p id="postNoteText1"></p>
        </article>
        <article class="post-note-card">
          <span id="postNoteLabel2" class="post-note-label"></span>
          <p id="postNoteText2"></p>
        </article>
      </section>

      <h2 id="sportHeading"></h2>
      <p id="sportText1"></p>

      <p id="sportText2"></p>

      <p id="sportText3"></p>

      <p id="sportText4"></p>

      <h2 id="builtInMotionHeading"></h2>
      <p id="builtInMotionText"></p>

      <p id="closingText1"></p>
      <p id="closingText2"></p>
    </div>

    <footer class="post-footer">
      <div class="post-tags">
        <span id="postTag1" class="tag"></span>
        <span id="postTag2" class="tag"></span>
        <span id="postTag3" class="tag"></span>
        <span id="postTag4" class="tag"></span>
      </div>
      <button id="backToTop" class="back-to-top" title="Back to top" aria-label="Back to top">&uarr;</button>
    </footer>
  </article>

  <script src="post.page.js"></script>
  <script src="../../../js/shared/site.js"></script>

</html>
